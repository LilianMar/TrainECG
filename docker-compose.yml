version: "3.8"

services:
  backend:
    build:
      context: ./backend
    container_name: trainecg-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./ecg_app.db
      - ENVIRONMENT=development
      - DEBUG=True
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - trainecg-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trainecg-frontend
    ports:
      - "9000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - trainecg-network

networks:
  trainecg-network:
    driver: bridge
