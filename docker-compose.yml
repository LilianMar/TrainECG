services:
  backend:
    build:
      context: ./backend
    container_name: trainecg-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./db/ecg_app.db
      - ENVIRONMENT=production
      - DEBUG=False
      - LOG_LEVEL=INFO
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./backend/db:/app/db
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
      # El modelo ML queda embebido en la imagen Docker (ver backend/.dockerignore).
      # No montar ./backend/models aquí: en servidores sin Git LFS el directorio
      # solo contiene un puntero de texto y sobreescribiría el modelo real de la imagen.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - trainecg-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: trainecg-frontend
    ports:
      - "9000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - trainecg-network

  # Seed automático — se ejecuta solo cuando el backend está healthy.
  # Usa INSERT OR IGNORE, es idempotente: seguro de correr múltiples veces.
  seed:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - ./backend:/app
    command: bun seed.js --db /app/db/ecg_app.db
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trainecg-network
    restart: "no"

networks:
  trainecg-network:
    driver: bridge
